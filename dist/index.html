  <body>
    <div id="root"></div>
    <script>
      (() => {
        const message = "Hi Digrro team, I would like to learn more about your services.";
        const whatsappHref = `https://wa.me/971544649231?text=${encodeURIComponent(message)}`;

        const syncWhatsAppLink = () => {
          const link = document.querySelector('a[aria-label="Chat with Digrro on WhatsApp"]');
          if (!link) {
            return false;
          }

          link.setAttribute("href", whatsappHref);
          return true;
        };

        if (syncWhatsAppLink()) {
          return;
        }

        const observer = new MutationObserver(() => {
          if (syncWhatsAppLink()) {
            observer.disconnect();
          }
        });

        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
    <script>
      (() => {
        const patchedPhoneHref = "tel:+962785450323";

        const injectContact = () => {
          if (document.querySelector(`a[href="${patchedPhoneHref}"]`)) {
            return true;
          }

          const referenceLink = document.querySelector('a[href="tel:+971562551980"]');
          const referenceEntry = referenceLink?.parentElement;
          const contactsList = referenceEntry?.parentElement;
          if (!referenceEntry || !contactsList) {
            return false;
          }

          const newEntry = referenceEntry.cloneNode(true);
          const newLink = newEntry.querySelector("a");
          if (!newLink) {
            return false;
          }

          newLink.setAttribute("href", patchedPhoneHref);
          newLink.textContent = "+962 7 8545 0323";
          referenceEntry.insertAdjacentElement("afterend", newEntry);
          return true;
        };

        injectContact();

        const observer = new MutationObserver(() => {
          injectContact();
        });

        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
