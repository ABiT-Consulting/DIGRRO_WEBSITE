  <body>
    <div id="root"></div>
    <script>
      (() => {
        const message = "Hi Digrro team, I would like to learn more about your services.";
        const whatsappHref = `https://wa.me/971544649231?text=${encodeURIComponent(message)}`;

        const syncWhatsAppLink = () => {
          const link = document.querySelector('a[aria-label="Chat with Digrro on WhatsApp"]');
          if (!link) {
            return false;
          }

          link.setAttribute("href", whatsappHref);
          return true;
        };

        if (syncWhatsAppLink()) {
          return;
        }

        const observer = new MutationObserver(() => {
          if (syncWhatsAppLink()) {
            observer.disconnect();
          }
        });

        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
    <script>
      (() => {
        const legacyPhoneHref = "tel:+971562551980";
        const patchedPhoneHref = "tel:+962785450323";
        const patchedPhoneText = "+962 7 8545 0323";

        const syncCreativeManagerContact = () => {
          document.querySelectorAll(`a[href="${legacyPhoneHref}"]`).forEach((link) => {
            link.setAttribute("href", patchedPhoneHref);
            link.textContent = patchedPhoneText;
          });

          const patchedLinks = [...document.querySelectorAll(`a[href="${patchedPhoneHref}"]`)];
          patchedLinks.slice(1).forEach((link) => {
            link.parentElement?.remove();
          });

          return patchedLinks.length > 0 || document.querySelector(`a[href="${patchedPhoneHref}"]`) !== null;
        };

        syncCreativeManagerContact();

        const observer = new MutationObserver(() => {
          syncCreativeManagerContact();
        });

        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
    <script>
      (() => {
        const ensureAcademyCta = () => {
          if (document.getElementById("digrro-academy-entry")) {
            return true;
          }

          const cta = document.createElement("a");
          cta.id = "digrro-academy-entry";
          cta.href = "/academy/";
          cta.textContent = "Explore Digrro Academy";
          Object.assign(cta.style, {
            position: "fixed",
            left: "16px",
            bottom: "16px",
            zIndex: "65",
            padding: "12px 18px",
            borderRadius: "999px",
            background: "linear-gradient(135deg, #ffd27a, #78e7ff)",
            color: "#07111f",
            fontWeight: "700",
            fontFamily: "Segoe UI, sans-serif",
            boxShadow: "0 18px 40px rgba(2, 8, 18, 0.28)",
            border: "1px solid rgba(255,255,255,0.35)",
            textDecoration: "none",
            maxWidth: "calc(100vw - 92px)",
          });

          document.body.appendChild(cta);
          return true;
        };

        if (ensureAcademyCta()) {
          return;
        }

        const observer = new MutationObserver(() => {
          if (ensureAcademyCta()) {
            observer.disconnect();
          }
        });

        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
