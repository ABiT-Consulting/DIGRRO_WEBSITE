<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password | Digrro Academy</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/png" sizes="64x64" href="../favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script type="module" crossorigin src="./assets/resetPassword-CoRFXIWy.js"></script>
    <link rel="modulepreload" crossorigin href="./assets/styles-C7q8VrX5.js">
    <link rel="stylesheet" crossorigin href="./assets/styles-lTG9xOFA.css">
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card" aria-labelledby="reset-password-title">
        <a class="brand auth-brand" href="./">
          <img src="../image_fc91df1d-53b0-439b-9c3e-c444469fda79-removebg-preview%20copy%20copy%20copy.png" alt="Digrro" />
          <span>Digrro Academy</span>
        </a>

        <span class="section-kicker">Password reset</span>
        <h1 id="reset-password-title">Create a new password</h1>
        <p>Use a secure password for the academy account linked to your email.</p>

        <form id="reset-password-form" class="field-stack" novalidate>
          <div class="field">
            <label for="reset-password">New password</label>
            <input
              id="reset-password"
              name="password"
              type="password"
              autocomplete="new-password"
              minlength="8"
              placeholder="Min. 8 characters"
              required
            />
          </div>
          <div class="field">
            <label for="reset-confirm-password">Confirm password</label>
            <input
              id="reset-confirm-password"
              name="confirmPassword"
              type="password"
              autocomplete="new-password"
              minlength="8"
              placeholder="Repeat new password"
              required
            />
          </div>
          <div class="form-status" id="reset-password-status" role="status" aria-live="polite">
            Checking your reset link...
          </div>
          <button type="submit" class="btn btn-primary btn-block" id="reset-password-submit">
            Reset password
          </button>
        </form>

        <p class="modal-foot">
          Remembered your password?
          <a class="link" href="./#login">Back to login</a>
        </p>
      </section>
    </main>
  </body>
</html>
