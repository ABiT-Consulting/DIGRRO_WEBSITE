# cPanel Git deployment config
# Deploy the production build from ./dist
deployment:
  tasks:
    - 'if [ -d "${HOME}/public_html/digrro.com" ]; then export DEPLOYPATH="${HOME}/public_html/digrro.com/"; elif [ -d "${HOME}/digrro.com" ]; then export DEPLOYPATH="${HOME}/digrro.com/"; elif [ -d "${HOME}/public_html/digrro" ]; then export DEPLOYPATH="${HOME}/public_html/digrro/"; elif [ -d "${HOME}/public_html" ]; then export DEPLOYPATH="${HOME}/public_html/"; else echo "ERROR: Digrro deploy path not found. Create ${HOME}/public_html or a dedicated document root such as ${HOME}/public_html/digrro.com."; exit 1; fi'
    - '/bin/mkdir -p "$DEPLOYPATH"'
    - '/bin/mkdir -p "$DEPLOYPATH/academy-data"'
    - '/usr/bin/find "$DEPLOYPATH" -mindepth 1 -maxdepth 1 ! -name ".env" ! -name "academy-data" -exec /bin/rm -rf {} +'
    - '/bin/cp -a ./dist/. "$DEPLOYPATH"'
    - 'if [ -f ./.env ]; then /bin/cp -a ./.env "$DEPLOYPATH/.env"; elif [ ! -f "$DEPLOYPATH/.env" ]; then echo "WARNING: No .env found in the repository or deploy path. Create $DEPLOYPATH/.env in cPanel for SMTP and runtime settings."; fi'
