name: Deploy to cPanel

on:
  push:
    branches:
      - main
      - cpanel-deploy
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

concurrency:
  group: cpanel-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-cpanel-branch:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu@4.24.0

      - name: Build academy bundle for cPanel branch
        shell: bash
        env:
          STRIPE_SECRET_KEY_LIVE: ${{ secrets.STRIPE_SECRET_KEY_LIVE }}
          STRIPE_SECRET_KEY_FALLBACK: ${{ secrets.STRIPE_SECRET_KEY }}
          ACADEMY_BASE_URL_SECRET: ${{ secrets.ACADEMY_BASE_URL }}
        run: |
          set -euo pipefail

          repo_stripe_secret="$(awk -F= '/^Secret key=/{sub(/^[[:space:]]+/, "", $2); sub(/[[:space:]]+$/, "", $2); print $2; exit}' .env 2>/dev/null || true)"
          repo_academy_base_url="$(awk -F= '/^ACADEMY_BASE_URL=/{sub(/^[[:space:]]+/, "", $2); sub(/[[:space:]]+$/, "", $2); print $2; exit}' .env 2>/dev/null || true)"

          export STRIPE_SECRET_KEY="${STRIPE_SECRET_KEY_LIVE:-${STRIPE_SECRET_KEY_FALLBACK:-$repo_stripe_secret}}"
          export ACADEMY_BASE_URL="${ACADEMY_BASE_URL_SECRET:-${repo_academy_base_url:-https://digrro.com/academy}}"
          export STRIPE_PAYMENT_LINK_TEST="https://buy.stripe.com/bJedRag7D4RNceU3rSdjO06"
          export STRIPE_PAYMENT_LINK_SPRINT="https://buy.stripe.com/bJedRag7D4RNceU3rSdjO06"
          export STRIPE_PAYMENT_LINK_BOOTCAMP="https://buy.stripe.com/bJedRag7D4RNceU3rSdjO06"
          export STRIPE_PAYMENT_LINK_CORPORATE="https://buy.stripe.com/5kQ6oIbRnesna6M8McdjO05"

          if ! npm run academy:stripe:sync; then
            echo "::warning::Stripe payment link sync failed. Continuing with checked-in payment links because production checkout sessions are created at runtime."
          fi

          npx vite build --config vite.academy.config.js
          node scripts/copy-academy-server-files.mjs

      - name: Push academy build to cpanel-deploy
        shell: bash
        env:
          DEPLOY_BRANCH: cpanel-deploy
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B academy-live-build
          git add -f dist
          if [ -f .env ]; then
            git add -f .env
          fi

          if ! git diff --cached --quiet; then
            git commit -m "Build academy assets for ${GITHUB_SHA}"
          fi

          git fetch origin "${DEPLOY_BRANCH}:refs/remotes/origin/${DEPLOY_BRANCH}" || true
          git push --force-with-lease="refs/heads/${DEPLOY_BRANCH}" origin "HEAD:${DEPLOY_BRANCH}"

      - name: Dispatch cPanel deploy workflow
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/actions/workflows/cpanel-deploy.yml/dispatches" \
            -d '{"ref":"cpanel-deploy"}'

  deploy:
    if: github.ref == 'refs/heads/cpanel-deploy'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trigger cPanel deployment and wait
        shell: bash
        env:
          CPANEL_HOST: ${{ secrets.CPANEL_HOST }}
          CPANEL_PORT: ${{ secrets.CPANEL_PORT }}
          CPANEL_USER: ${{ secrets.CPANEL_USER }}
          CPANEL_TOKEN: ${{ secrets.CPANEL_TOKEN }}
          CPANEL_REPO_ROOT: ${{ secrets.CPANEL_REPO_ROOT }}
          CPANEL_BRANCH: cpanel-deploy
          CPANEL_INSECURE: ${{ secrets.CPANEL_INSECURE }}
          STRIPE_SECRET_KEY_LIVE: ${{ secrets.STRIPE_SECRET_KEY_LIVE }}
          STRIPE_SECRET_KEY_FALLBACK: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          ACADEMY_BASE_URL_SECRET: ${{ secrets.ACADEMY_BASE_URL }}
        run: |
          set -euo pipefail

          : "${CPANEL_HOST:?Missing secret CPANEL_HOST (example: server.example.com)}"
          : "${CPANEL_USER:?Missing secret CPANEL_USER (your cPanel username)}"
          : "${CPANEL_TOKEN:?Missing secret CPANEL_TOKEN (cPanel API token)}"
          : "${CPANEL_REPO_ROOT:?Missing secret CPANEL_REPO_ROOT (absolute path to the cPanel git repo)}"

          port="${CPANEL_PORT:-2083}"
          branch="${CPANEL_BRANCH:-cpanel-deploy}"
          base="https://${CPANEL_HOST}:${port}"

          auth_header="Authorization: cpanel ${CPANEL_USER}:${CPANEL_TOKEN}"
          curl_flags=(-sS --connect-timeout 10 --max-time 45 --retry 1)
          if [[ "${CPANEL_INSECURE:-}" == "true" ]]; then
            curl_flags+=(-k)
          fi

          if ! command -v jq >/dev/null 2>&1; then
            echo "::error::jq is required but not found on the runner."
            exit 1
          fi

          cpanel_get() {
            local endpoint="$1"; shift
            local out="$1"; shift
            local url="${base}/execute/${endpoint}"
            local err
            err="$(mktemp)"

            local cmd=(curl "${curl_flags[@]}" -H "$auth_header" -H "Accept: application/json" --get)
            local kv
            for kv in "$@"; do
              cmd+=(--data-urlencode "$kv")
            done
            cmd+=("$url" -o "$out" -w "%{http_code}")

            set +e
            local code
            code="$("${cmd[@]}" 2>"$err")"
            local rc=$?
            set -e

            if (( rc != 0 )); then
              echo "::error::curl failed for ${endpoint} (rc=${rc})"
              sed -n '1,200p' "$err" || true
              if [[ -s "$out" ]]; then
                echo "---- response ----"
                sed -n '1,200p' "$out" || true
                echo "---- end ----"
              fi
              return 1
            fi

            if [[ "$code" =~ ^[0-9]+$ ]] && (( code >= 400 )); then
              echo "::error::HTTP ${code} from ${endpoint}"
              if [[ -s "$out" ]]; then
                echo "---- response ----"
                sed -n '1,200p' "$out" || true
                echo "---- end ----"
              fi
              return 1
            fi

            return 0
          }

          cpanel_api2_get() {
            local out="$1"; shift
            local url="${base}/json-api/cpanel"
            local err
            err="$(mktemp)"

            local cmd=(curl "${curl_flags[@]}" -H "$auth_header" -H "Accept: application/json" --get)
            cmd+=(--data-urlencode "cpanel_jsonapi_user=${CPANEL_USER}")
            cmd+=(--data-urlencode "cpanel_jsonapi_apiversion=2")
            local kv
            for kv in "$@"; do
              cmd+=(--data-urlencode "$kv")
            done
            cmd+=("$url" -o "$out" -w "%{http_code}")

            set +e
            local code
            code="$("${cmd[@]}" 2>"$err")"
            local rc=$?
            set -e

            if (( rc != 0 )); then
              sed -n '1,80p' "$err" || true
              return 1
            fi

            if [[ "$code" =~ ^[0-9]+$ ]] && (( code >= 400 )); then
              return 1
            fi

            return 0
          }

          cpanel_post() {
            local endpoint="$1"; shift
            local out="$1"; shift
            local url="${base}/execute/${endpoint}"
            local err
            err="$(mktemp)"

            local cmd=(curl "${curl_flags[@]}" -X POST -H "$auth_header" -H "Accept: application/json")
            local kv
            for kv in "$@"; do
              cmd+=(--data-urlencode "$kv")
            done
            cmd+=("$url" -o "$out" -w "%{http_code}")

            set +e
            local code
            code="$("${cmd[@]}" 2>"$err")"
            local rc=$?
            set -e

            if (( rc != 0 )); then
              sed -n '1,80p' "$err" || true
              return 1
            fi

            if [[ "$code" =~ ^[0-9]+$ ]] && (( code >= 400 )); then
              return 1
            fi

            return 0
          }

          cpanel_upload() {
            local endpoint="$1"; shift
            local out="$1"; shift
            local target_dir="$1"; shift
            local source_file="$1"; shift
            local target_file="$1"; shift
            local url="${base}/execute/${endpoint}"
            local err
            err="$(mktemp)"

            local cmd=(
              curl "${curl_flags[@]}" -X POST
              -H "$auth_header"
              -H "Accept: application/json"
              -F "dir=${target_dir}"
              -F "file-1=@${source_file};filename=${target_file}"
              "$url" -o "$out" -w "%{http_code}"
            )

            set +e
            local code
            code="$("${cmd[@]}" 2>"$err")"
            local rc=$?
            set -e

            if (( rc != 0 )); then
              sed -n '1,80p' "$err" || true
              return 1
            fi

            if [[ "$code" =~ ^[0-9]+$ ]] && (( code >= 400 )); then
              return 1
            fi

            return 0
          }

          ensure_cpanel_dir() {
            local parent_dir="$1"
            local dir_name="$2"
            local response

            if [[ -z "$parent_dir" || -z "$dir_name" ]]; then
              return 0
            fi

            response="$(mktemp)"
            cpanel_api2_get "$response" \
              "cpanel_jsonapi_module=Fileman" \
              "cpanel_jsonapi_func=mkdir" \
              "path=${parent_dir}" \
              "name=${dir_name}" || true
          }

          publish_academy_file() {
            local source_file="$1"
            local target_dir="$2"
            local target_file="$3"
            local response
            local content

            if [[ ! -f "$source_file" ]]; then
              return 0
            fi

            content="$(<"$source_file")"
            response="$(mktemp)"
            if cpanel_post "Fileman/save_file_content" "$response" \
              "dir=${target_dir}" \
              "file=${target_file}" \
              "content=${content}" \
              "from_charset=UTF-8" \
              "to_charset=UTF-8"; then
              if jq -e '((.result // .).status // 0) == 1' "$response" >/dev/null 2>&1; then
                echo "Direct-published ${target_dir}/${target_file}"
              else
                echo "Direct publish skipped for ${target_dir}/${target_file}"
                jq -c '(.result // .).errors // empty' "$response" 2>/dev/null || true
              fi
            else
              echo "Direct publish request failed for ${target_dir}/${target_file}"
            fi
          }

          upload_academy_file() {
            local source_file="$1"
            local target_dir="$2"
            local target_file="$3"
            local response

            if [[ ! -f "$source_file" ]]; then
              return 1
            fi

            response="$(mktemp)"
            if cpanel_upload "Fileman/upload_files" "$response" "$target_dir" "$source_file" "$target_file"; then
              if jq -e '((.result // .).status // 0) == 1' "$response" >/dev/null 2>&1; then
                echo "Uploaded ${target_dir}/${target_file}"
                return 0
              fi
              echo "Upload skipped for ${target_dir}/${target_file}"
              jq -c '(.result // .).errors // empty' "$response" 2>/dev/null || true
            else
              echo "Upload request failed for ${target_dir}/${target_file}"
            fi

            return 1
          }

          copy_cpanel_file() {
            local source_file="$1"
            local target_dir="$2"
            local target_file="$3"
            local target_path="${target_dir%/}/${target_file}"
            local unlink_response
            local copy_response

            unlink_response="$(mktemp)"
            cpanel_api2_get "$unlink_response" \
              "cpanel_jsonapi_module=Fileman" \
              "cpanel_jsonapi_func=fileop" \
              "op=unlink" \
              "sourcefiles=${target_path}" \
              "doubledecode=1" || true

            copy_response="$(mktemp)"
            if cpanel_api2_get "$copy_response" \
              "cpanel_jsonapi_module=Fileman" \
              "cpanel_jsonapi_func=fileop" \
              "op=copy" \
              "sourcefiles=${source_file}" \
              "destfiles=${target_path}" \
              "doubledecode=1"; then
              if jq -e '((.cpanelresult.event.result // 0) == 1) or ((.cpanelresult.data // []) | map(.result // 0) | any(. == 1))' "$copy_response" >/dev/null 2>&1; then
                echo "Copied ${target_path}"
                return 0
              fi
              echo "Copy skipped for ${target_path}"
              jq -c '.cpanelresult.data // .cpanelresult.error // empty' "$copy_response" 2>/dev/null || true
            else
              echo "Copy request failed for ${target_path}"
            fi

            return 1
          }

          server_copy_academy_release() {
            local root
            local source_root
            local repo_root_abs="${CPANEL_REPO_ROOT%/}"
            local repo_root_rel="${repo_root_abs#*/${CPANEL_USER}/}"
            local roots=(
              "public_html/digrro.com"
              "digrro.com"
              "public_html/digrro"
              "public_html"
            )
            local api_file
            local asset
            local page_file

            source_root="$repo_root_abs"
            if [[ -n "$repo_root_rel" && "$repo_root_rel" != "$repo_root_abs" ]]; then
              source_root="$repo_root_rel"
            fi

            for root in "${roots[@]}"; do
              if [[ -z "$root" ]]; then
                continue
              fi

              ensure_cpanel_dir "$root" "academy"
              ensure_cpanel_dir "${root}/academy" "api"
              ensure_cpanel_dir "${root}/academy" "assets"

              while IFS= read -r api_file; do
                copy_cpanel_file "${source_root}/dist/academy/api/${api_file}" "${root}/academy/api" "$api_file"
              done < <(find dist/academy/api -maxdepth 1 -type f -printf '%f\n' || true)

              while IFS= read -r asset; do
                copy_cpanel_file "${source_root}/dist/academy/assets/${asset}" "${root}/academy/assets" "$asset"
              done < <(find dist/academy/assets -maxdepth 1 -type f -printf '%f\n' || true)

              for page_file in index.html admin.html reset-password.html; do
                publish_academy_file "dist/academy/${page_file}" "${root}/academy" "$page_file"
              done

              copy_cpanel_file "${source_root}/dist/academy/index-live.html" "${root}/academy" "index-live.html"
              copy_cpanel_file "${source_root}/dist/academy/.htaccess" "${root}/academy" ".htaccess"
            done
          }

          run_academy_php_asset_installer() {
            local installer_file
            local token
            local asset_json
            local root
            local install_response
            local api_json
            local roots=(
              "public_html/test.digrro.com"
              "test.digrro.com"
              "public_html/digrro.com"
              "digrro.com"
              "public_html/digrro"
              "public_html"
            )

            token="$(openssl rand -hex 16)"
            installer_file="$(mktemp)"
            asset_json="$(find dist/academy/assets -maxdepth 1 -type f -printf 'assets/%f\n' | jq -R -s -c 'split("\n")[:-1]')"
            api_json="$(find dist/academy/api -maxdepth 1 -type f -printf 'api/%f\n' | jq -R -s -c 'split("\n")[:-1]')"

            cat > "$installer_file" <<PHP
          <?php
          \$expectedToken = '${token}';
          if (!isset(\$_GET['token']) || !hash_equals(\$expectedToken, (string) \$_GET['token'])) {
              http_response_code(404);
              exit;
          }

          \$sourceRoot = '${CPANEL_REPO_ROOT%/}/dist/academy';
          \$targetRoot = __DIR__;
          \$assets = ${asset_json};
          \$apiFiles = ${api_json};
          \$pages = ['index.html', 'admin.html', 'reset-password.html', 'index-live.html', '.htaccess'];
          \$copied = [];
          \$errors = [];

          \$copyFile = static function (string \$relative) use (\$sourceRoot, \$targetRoot, &\$copied, &\$errors): void {
              \$source = \$sourceRoot . '/' . \$relative;
              \$target = \$targetRoot . '/' . \$relative;
              \$targetDir = dirname(\$target);
              if (!is_dir(\$targetDir) && !mkdir(\$targetDir, 0755, true) && !is_dir(\$targetDir)) {
                  \$errors[] = "mkdir failed: {\$targetDir}";
                  return;
              }
              if (!is_readable(\$source)) {
                  \$errors[] = "source missing: {\$relative}";
                  return;
              }
              if (!copy(\$source, \$target)) {
                  \$errors[] = "copy failed: {\$relative}";
                  return;
              }
              @chmod(\$target, 0644);
              \$copied[] = \$relative;
          };

          foreach (\$assets as \$asset) {
              \$copyFile(\$asset);
          }
          foreach (\$apiFiles as \$apiFile) {
              \$copyFile(\$apiFile);
          }
          foreach (\$pages as \$page) {
              \$copyFile(\$page);
          }

          header('Content-Type: application/json');
          echo json_encode([
              'ok' => count(\$errors) === 0,
              'copied' => count(\$copied),
              'errors' => \$errors,
          ], JSON_UNESCAPED_SLASHES);

          if (count(\$errors) === 0) {
              @unlink(__FILE__);
          }
          PHP

            for root in "${roots[@]}"; do
              publish_academy_file "$installer_file" "${root}/academy" "academy-asset-installer.php"
            done

            install_response="$(mktemp)"
            curl -sS --fail --max-time 90 \
              "https://digrro.com/academy/academy-asset-installer.php?token=${token}" \
              -o "$install_response"
            jq . "$install_response"
            if ! jq -e '.ok == true' "$install_response" >/dev/null; then
              echo "::error::Academy PHP asset installer reported errors."
              exit 1
            fi
          }

          direct_publish_academy_assets() {
            local account_home="/home/${CPANEL_USER}"
            local root
            local repo_root_abs="${CPANEL_REPO_ROOT%/}"
            local repo_root_rel="${repo_root_abs#${account_home}/}"
            local roots=(
              "public_html/test.digrro.com"
              "test.digrro.com"
              "public_html/digrro.com"
              "public_html/digrro"
              "public_html"
            )
            local asset
            local api_file
            local page_file

            for root in "${roots[@]}"; do
              if [[ -z "$root" ]]; then
                continue
              fi

              ensure_cpanel_dir "$root" "academy"
              ensure_cpanel_dir "${root}/academy" "api"
              ensure_cpanel_dir "${root}/academy" "assets"

              while IFS= read -r api_file; do
                publish_academy_file "dist/academy/api/${api_file}" "${root}/academy/api" "$api_file"
              done < <(find dist/academy/api -maxdepth 1 -type f -printf '%f\n' || true)

              asset_failure=0
              asset_count=0
              while IFS= read -r asset; do
                if upload_academy_file "dist/academy/assets/${asset}" "${root}/academy/assets" "$asset"; then
                  asset_count=$((asset_count + 1))
                else
                  asset_failure=1
                fi
              done < <(find dist/academy/assets -maxdepth 1 -type f -printf '%f\n' || true)

              if (( asset_count > 0 && asset_failure == 0 )); then
                for page_file in index.html admin.html reset-password.html; do
                  publish_academy_file "dist/academy/${page_file}" "${root}/academy" "${page_file}"
                done
              else
                echo "Skipping direct index publish for ${root}/academy because asset upload was incomplete"
              fi
            done
          }

          create_academy_runtime_env() {
            local output_file="$1"
            local stripe_secret_key="${STRIPE_SECRET_KEY_LIVE:-${STRIPE_SECRET_KEY_FALLBACK:-}}"
            local academy_base_url="${ACADEMY_BASE_URL_SECRET:-https://digrro.com/academy}"

            if [[ -z "${stripe_secret_key}" ]]; then
              echo "::warning::Skipping academy runtime env publish because STRIPE_SECRET_KEY_LIVE or STRIPE_SECRET_KEY is not configured."
              return 1
            fi

            {
              printf 'STRIPE_SECRET_KEY=%s\n' "${stripe_secret_key}"
              printf 'secret_key=%s\n' "${stripe_secret_key}"
              printf 'ACADEMY_BASE_URL=%s\n' "${academy_base_url}"
              if [[ -n "${STRIPE_WEBHOOK_SECRET:-}" ]]; then
                printf 'STRIPE_WEBHOOK_SECRET=%s\n' "${STRIPE_WEBHOOK_SECRET}"
              fi
            } > "${output_file}"
          }

          direct_publish_academy_runtime_env() {
            local account_home="/home/${CPANEL_USER}"
            local root
            local runtime_env_file
            local repo_root_abs="${CPANEL_REPO_ROOT%/}"
            local repo_root_rel="${repo_root_abs#${account_home}/}"
            local roots=(
              "public_html/test.digrro.com"
              "test.digrro.com"
              "public_html/digrro.com"
              "public_html/digrro"
              "public_html"
            )

            runtime_env_file="$(mktemp)"
            if ! create_academy_runtime_env "${runtime_env_file}"; then
              rm -f "${runtime_env_file}"
              return 0
            fi

            for root in "${roots[@]}"; do
              if [[ -z "$root" ]]; then
                continue
              fi

              ensure_cpanel_dir "$root" "academy"
              publish_academy_file "${runtime_env_file}" "${root}/academy" ".env.local"
            done

            rm -f "${runtime_env_file}"
          }

          direct_publish_main_site_assets() {
            local account_home="/home/${CPANEL_USER}"
            local root
            local repo_root_abs="${CPANEL_REPO_ROOT%/}"
            local repo_root_rel="${repo_root_abs#${account_home}/}"
            local roots=(
              "public_html/test.digrro.com"
              "test.digrro.com"
              "public_html/digrro.com"
              "public_html/digrro"
              "public_html"
            )
            local root_file
            local asset
            local video

            for root in "${roots[@]}"; do
              if [[ -z "$root" ]]; then
                continue
              fi

              while IFS= read -r root_file; do
                upload_academy_file "dist/${root_file}" "${root}" "$root_file" || true
              done < <(find dist -maxdepth 1 -type f -printf '%f\n' || true)

              ensure_cpanel_dir "$root" "assets"
              while IFS= read -r asset; do
                upload_academy_file "dist/assets/${asset}" "${root}/assets" "$asset" || true
              done < <(find dist/assets -maxdepth 1 -type f -printf '%f\n' || true)

              if [[ -d dist/videos ]]; then
                ensure_cpanel_dir "$root" "videos"
                while IFS= read -r video; do
                  upload_academy_file "dist/videos/${video}" "${root}/videos" "$video" || true
                done < <(find dist/videos -maxdepth 1 -type f -printf '%f\n' || true)
              fi
            done
          }

          should_publish_main_site_assets() {
            local changed_files
            changed_files="$(git diff-tree --no-commit-id --name-only -r "${GITHUB_SHA}" 2>/dev/null || true)"

            if [[ -z "${changed_files}" ]]; then
              return 1
            fi

            echo "${changed_files}" | grep -Eq '^(dist/(index\.html|assets/|videos/)|index\.html|src/|public/|package(-lock)?\.json|vite\.config\.)'
          }

          cleanup_runtime_files() {
            local account_home="/home/${CPANEL_USER}"
            local cleanup_resp
            local status_file
            local status_files=(
              "${CPANEL_REPO_ROOT%/}/academy/api/mail-sync-status.json"
              "${account_home}/public_html/digrro.com/academy/api/mail-sync-status.json"
              "${account_home}/digrro.com/academy/api/mail-sync-status.json"
              "${account_home}/public_html/digrro/academy/api/mail-sync-status.json"
              "${account_home}/public_html/academy/api/mail-sync-status.json"
              "public_html/digrro.com/academy/api/mail-sync-status.json"
              "digrro.com/academy/api/mail-sync-status.json"
              "public_html/digrro/academy/api/mail-sync-status.json"
              "public_html/academy/api/mail-sync-status.json"
              "academy/api/mail-sync-status.json"
            )

            for status_file in "${status_files[@]}"; do
              cleanup_resp="$(mktemp)"
              cpanel_api2_get "$cleanup_resp" \
                "cpanel_jsonapi_module=Fileman" \
                "cpanel_jsonapi_func=fileop" \
                "op=unlink" \
                "sourcefiles=${status_file}" \
                "doubledecode=1" || true
            done
          }

          jq_ok_or_dump() {
            local file="$1"
            if ! jq . "$file" >/dev/null 2>&1; then
              echo "::error::Response was not valid JSON."
              sed -n '1,200p' "$file" || true
              return 1
            fi
            return 0
          }

          jq_status_or_error() {
            local file="$1"
            local endpoint="$2"
            if ! jq -e '((.result // .).status // 0) == 1' "$file" >/dev/null 2>&1; then
              echo "::error::${endpoint} returned status != 1"
              raw="$(jq -c '.' "$file" 2>/dev/null || true)"
              if [[ -n "${raw:-}" && "${raw:-null}" != "null" ]]; then
                raw="${raw:0:1500}"
                echo "::error::Response(excerpt): ${raw}"
              fi
              reason="$(jq -r '(.result // .).metadata.reason // empty' "$file" 2>/dev/null || true)"
              if [[ -n "${reason:-}" && "${reason:-null}" != "null" ]]; then
                echo "::error::Reason: ${reason}"
              fi
              errors_json="$(jq -c '(.result // .).errors // empty' "$file" 2>/dev/null || true)"
              if [[ -n "${errors_json:-}" && "${errors_json:-null}" != "null" && "${errors_json:-}" != "[]" ]]; then
                echo "::error::Errors: ${errors_json}"
              fi
              return 1
            fi
            return 0
          }

          direct_publish_academy_runtime_env
          cleanup_runtime_files

          echo "Runtime env was prepared through cPanel Fileman when secrets were available. Publishing academy assets through cPanel Git deployment."

          echo "Updating cPanel repo (branch=${branch}): ${CPANEL_REPO_ROOT}"
          update_resp="$(mktemp)"
          cpanel_get "VersionControl/update" "$update_resp" \
            "repository_root=${CPANEL_REPO_ROOT}" \
            "branch=${branch}"
          jq_ok_or_dump "$update_resp"
          jq . "$update_resp"
          jq_status_or_error "$update_resp" "VersionControl/update"

          echo "Copying academy release from the cPanel repo into public web roots."
          server_copy_academy_release
          run_academy_php_asset_installer
          direct_publish_main_site_assets
          echo "Academy release copied through cPanel Fileman server-side copy."
          exit 0

          deployable="$(jq -r '(.result // .).data.deployable // 0' "$update_resp")"
          deployable_reason="$(jq -r '(.result // .).data.deployable_reason // empty' "$update_resp")"
          if [[ "$deployable" != "1" ]]; then
            echo "::error::Repository is not deployable. ${deployable_reason}"
            exit 1
          fi

          echo "Triggering cPanel deploy for repo: ${CPANEL_REPO_ROOT}"
          create_resp="$(mktemp)"
          cpanel_get "VersionControlDeployment/create" "$create_resp" \
            "repository_root=${CPANEL_REPO_ROOT}"
          jq_ok_or_dump "$create_resp"
          jq . "$create_resp"
          jq_status_or_error "$create_resp" "VersionControlDeployment/create"

          deploy_id="$(jq -r '(.result // .).data.deploy_id // empty' "$create_resp")"
          if [[ -z "$deploy_id" || "$deploy_id" == "null" ]]; then
            echo "::error::Missing deploy_id in response."
            exit 1
          fi

          echo "Deployment queued: deploy_id=${deploy_id}"

          deadline=$((SECONDS + 300))
          while true; do
            retrieve_resp="$(mktemp)"
            cpanel_get "VersionControlDeployment/retrieve" "$retrieve_resp"
            jq_ok_or_dump "$retrieve_resp"

            entry="$(jq -c --arg id "$deploy_id" '((.result // .).data[]? | select((.deploy_id|tostring) == $id) | .) // empty' "$retrieve_resp" | head -n1 || true)"
            if [[ -z "$entry" ]]; then
              echo "Waiting for deploy_id=${deploy_id} to appear..."
            else
              echo "$entry" | jq .
              succeeded="$(echo "$entry" | jq -r '.timestamps.succeeded // empty')"
              failed="$(echo "$entry" | jq -r '.timestamps.failed // empty')"
              canceled="$(echo "$entry" | jq -r '.timestamps.canceled // empty')"

              if [[ -n "$succeeded" ]]; then
                ident="$(echo "$entry" | jq -r '.repository_state.identifier // empty')"
                deployed_branch="$(echo "$entry" | jq -r '.repository_state.branch // empty')"
                echo "cPanel deploy: success (branch=${deployed_branch}, commit=${ident})"
                exit 0
              fi

              if [[ -n "$failed" || -n "$canceled" ]]; then
                echo "::error::cPanel deploy failed (deploy_id=${deploy_id})"
                exit 1
              fi
            fi

            if (( SECONDS >= deadline )); then
              echo "::error::Timed out waiting for cPanel deployment to complete (deploy_id=${deploy_id})."
              exit 1
            fi

            sleep 3
          done
